<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ML Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">
        <img src="/static/images/logo.png" alt="logo">
        <span>ML Monitor</span>
    </div>
    <div class="nav-links">
        <span id="nav-username"></span>
        <button id="btn-logout">Déconnexion</button>
    </div>
</nav>

<div class="tabs-bar">
    <div class="tabs">
        <button class="tab active" data-dataset="fashion_mnist">Fashion MNIST</button>
        <button class="tab" data-dataset="cifar100">CIFAR-100</button>
    </div>
    <button class="btn-train" id="btn-train" style="display:none;">Lancer l'entraînement</button>
</div>

<div class="columns">

    <div class="col">
        <div class="col-header">
            PyTorch
            <span id="pt-status" style="font-size: 13px; margin-left: 15px; font-weight: 400; color: #7a7a95;"></span>
        </div>
        <div class="graph-card"><div id="pt-accuracy"></div></div>
        <div class="graph-card"><div id="pt-speed"></div></div>
        <div class="graph-card admin-only" id="pt-cpu-card" style="display:none;"><div id="pt-cpu"></div></div>
        <div class="graph-card admin-only" id="pt-ram-card" style="display:none;"><div id="pt-ram"></div></div>
    </div>

    <div class="col">
        <div class="col-header">
            TensorFlow
            <span id="tf-status" style="font-size: 13px; margin-left: 15px; font-weight: 400; color: #7a7a95;"></span>
        </div>
        <div class="graph-card"><div id="tf-accuracy"></div></div>
        <div class="graph-card"><div id="tf-speed"></div></div>
        <div class="graph-card admin-only" id="tf-cpu-card" style="display:none;"><div id="tf-cpu"></div></div>
        <div class="graph-card admin-only" id="tf-ram-card" style="display:none;"><div id="tf-ram"></div></div>
    </div>

</div>

<script src="/static/js/dashboard.js"></script>

</body>
</html>
