<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ML Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-logo">
        <img src="/static/images/logo.png" alt="logo">
        <span>ML Monitor</span>
    </div>
    <div class="nav-links">
        <span id="nav-username"></span>
        <button id="btn-logout">Déconnexion</button>
    </div>
</nav>

<!-- BARRE D'ONGLETS DATASETS -->
<div class="tabs-bar">
    <div class="tabs">
        <button class="tab active" data-dataset="fashion_mnist">Fashion MNIST</button>
        <button class="tab" data-dataset="cifar100">CIFAR-100</button>
    </div>

    <!-- Bouton lancer entraînement (admin uniquement) -->
    <button class="btn-train" id="btn-train" style="display:none;">
        Lancer l'entraînement
    </button>
</div>

<!-- CONTENU PRINCIPAL -->
<main class="main">

    <!-- Graphe : Précision du modèle -->
    <section class="graph-card">
        <h2>Précision du modèle</h2>
        <div id="chart-accuracy"></div>
    </section>

    <!-- Graphe : Vitesse d'exécution -->
    <section class="graph-card">
        <h2>Vitesse d'exécution</h2>
        <div id="chart-speed"></div>
    </section>

    <!-- Graphes admin uniquement : CPU et RAM -->
    <section class="graph-card" id="cpu-section" style="display:none;">
        <h2>Utilisation CPU <span class="admin-badge">Admin</span></h2>
        <div id="chart-cpu"></div>
    </section>

    <section class="graph-card" id="ram-section" style="display:none;">
        <h2>Utilisation RAM <span class="admin-badge">Admin</span></h2>
        <div id="chart-ram"></div>
    </section>

</main>

<script src="/static/js/dashboard.js"></script>

</body>
</html>
