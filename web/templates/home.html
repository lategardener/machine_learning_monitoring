<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine learning monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/home.css">
</head>
<body>

<div class="layout">

    <!-- Bloc gauche pour inscription et connexion-->
    <div class="left">
        <div class="form-area">
            <div id="error"></div>
            <div id="success"></div>

            <p class="subtitle">Bienvenue</p>
            <h1>Se connecter</h1>
            <p class="description">Accédez au tableau de bord de monitoring.</p>

            <div class="field">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="votre identifiant">
            </div>

            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••">
            </div>

            <button class="btn-primary" onclick="Login(event)">Se connecter</button>

            <div class="create-link">
                Pas encore de compte ? <a href="/create">Créer un compte</a>
            </div>
        </div>

    </div>

    <!-- bloc droit -->
    <div class="right">
    </div>

</div>

<script src="./static/js/home.js"></script>

</body>
</html>
